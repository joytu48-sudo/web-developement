<!DOCTYPE html>
<html>

<head></head>

<body>
    <h1>Loop</h1>
    <p id="number"></p>

    <script>
        let text = "";
        let i = 1;
        while (i<=10) {
            text = text + "<br>" + i
            i++
        }
        document.getElementById("number").innerHTML = text;
    </script>
</body>

</html>
