<!DOCTYPE html>
<html>
    <head>
    </head>
    <h1>Javascript Methods</h1>
    <script>
        var word = "AmAziNG"
        document.write(word)

        //Converting to uppercase
        document.write("<br>"+word.toUpperCase());
        //converting to lowercase
        document.write("<br>"+word.toLowerCase());
        //checking wether the string starts with a T
        document.write("<br>"+word.startsWith("T"));
    </script>
</html>
