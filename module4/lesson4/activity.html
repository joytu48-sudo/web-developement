<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h1>intro to object</h1>
        <p id = "object"></p>
        <script>
            //creating a object
            var person = {
                'name' : 'Sushmoy',
                'age' : 12,
                'city' : 'Dhaka'
                
            }
            //accessing object properties
            document.getElementById("object").innerHTML =
            "my name is " + person.name + " i am " + person.age + " years old and i live in " + person.city + "."

        </script>
    </body>
</html>
