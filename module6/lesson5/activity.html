<!DOCTYPE html>
<html>

<head></head>

<body>
    <div class="wrapper">
        <h1>Stopwatch</h1>
        <p><span id="seconds">00</span>:<span id="milliseconds">00</span></p>
        <button id="start">start</button>
        <button id="stop">stop</button>
        <button id="reset">reset</button>
    </div>

    <script>
        var seconds = 0;
        var milliseconds = 0;
        var appendMilliseconds;
        var appendSeconds;
        var interval;
        window.onload = function () {
            appendMilliseconds = document.getElementById("milliseconds")
            appendSeconds = document.getElementById("seconds")
            var buttonStart = document.getElementById("start")
            var buttonStop = document.getElementById("stop")
            var buttonReset = document.getElementById("reset")

            buttonStart.onclick = function () {
                clearInterval(interval);
                interval = setInterval(startTimer, 10);
            }
            buttonStop.onclick = function () {
                clearInterval(interval);
            }
            buttonReset.onclick = function () {
                clearInterval(interval);
                seconds = 0;
                milliseconds = 0;
                appendSeconds.innerHTML = "00";
                appendMilliseconds.innerHTML ="00";

            }
            function startTimer() {
                milliseconds++;
                if (milliseconds <= 9) {
                    appendMilliseconds.innerHTML = "0" + milliseconds;
                }
                else {
                    appendMilliseconds.innerHTML = milliseconds;
                }
                if (milliseconds > 99) {
                    seconds++;
                    appendSeconds.innerHTML = "0" + seconds;
                    milliseconds = 0;
                    appendMilliseconds.innerHTML = "0" + milliseconds
                }
            }
        }
    </script>
</body>

</html>
